<!DOCTYPE html>
<html lang="en" class="antialiased dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHall — Log in</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Framework) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons (Assets) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Configuration & Custom Styles -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        surface: {
                            950: '#0a0a0b',
                            900: '#121214',
                            800: '#1c1c1f',
                            700: '#27272a',
                            600: '#3f3f46',
                            500: '#52525b',
                        },
                        accent: {
                            emerald: '#10b981',
                            amber: '#f59e0b',
                        },
                        danger: '#ef4444',
                    },
                    animation: {
                        'enter-card': 'enterCard 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'spin-slow': 'spin 2s linear infinite',
                    },
                    keyframes: {
                        enterCard: {
                            '0%': { opacity: '0', transform: 'translateY(20px) scale(0.98)' },
                            '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(-4px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Design System Primitives & Overrides */
        :root {
            --border-hairline: rgba(255, 255, 255, 0.06);
            --glow-focus: 0 0 0 2px rgba(16, 185, 129, 0.4);
            --bg-grid: rgba(255, 255, 255, 0.02);
        }

        body {
            background-color: theme('colors.surface.950');
            color: rgba(255,255,255,0.92);
            /* Prevent overscroll bounce exposing white background */
            overscroll-behavior-y: none; 
        }

        /* Subtle Architectural Background Grid */
        .bg-architectural {
            background-image: 
                linear-gradient(to right, var(--bg-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--bg-grid) 1px, transparent 1px);
            background-size: 64px 64px;
            background-position: center top;
            mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
        }

        /* Input Reset & Styling */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px theme('colors.surface.800') inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .input-primitive {
            background-color: theme('colors.surface.800');
            border: 1px solid var(--border-hairline);
            transition: all 0.2s ease;
        }

        .input-primitive:focus {
            outline: none;
            border-color: theme('colors.accent.emerald');
            box-shadow: var(--glow-focus);
            background-color: theme('colors.surface.900');
        }

        .input-primitive.input-error {
            border-color: theme('colors.danger');
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }

        /* Custom Checkbox */
        .checkbox-primitive {
            appearance: none;
            width: 16px;
            height: 16px;
            background-color: theme('colors.surface.800');
            border: 1px solid var(--border-hairline);
            border-radius: 4px;
            display: inline-grid;
            place-content: center;
            transition: all 0.15s ease;
            cursor: pointer;
        }
        
        .checkbox-primitive::before {
            content: "";
            width: 10px;
            height: 10px;
            transform: scale(0);
            transition: 120ms transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 1em 1em white;
            background-color: white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .checkbox-primitive:checked {
            background-color: theme('colors.accent.emerald');
            border-color: theme('colors.accent.emerald');
        }

        .checkbox-primitive:checked::before {
            transform: scale(1);
        }

        .checkbox-primitive:focus-visible {
            outline: none;
            box-shadow: var(--glow-focus);
        }

        /* Button Enhancements */
        .btn-primary {
            background-color: theme('colors.accent.emerald');
            color: white;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-primary:active:not(:disabled) {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            background-color: theme('colors.surface.700');
            color: rgba(255,255,255,0.4);
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary:hover:not(:disabled) {
            filter: brightness(1.1);
        }

        /* Glassmorphism Refraction (Meso-Architecture context) */
        .glass-panel {
            background: theme('colors.surface.900');
            box-shadow: 
                0 8px 32px -8px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.08),
                inset 0 0 0 1px rgba(255,255,255,0.02);
            border: 1px solid var(--border-hairline);
        }

        /* Offline Toggle for Dev Testing (Hidden normally, exposed via specific email) */
        .toast-enter {
            animation: fadeIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Hide scrollbar for clean app feel */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="selection:bg-accent-emerald/30 selection:text-white">

    <!-- Connection State Indicator (The Wedge) -->
    <div id="connection-wedge" class="fixed top-4 right-4 z-50 flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface-800 border border-white/[0.06] shadow-lg transition-colors duration-300 pointer-events-none">
        <div id="wedge-dot" class="w-1.5 h-1.5 rounded-full bg-accent-emerald transition-colors duration-300 shadow-[0_0_8px_theme('colors.accent.emerald')]"></div>
        <span id="wedge-text" class="text-xs font-medium text-white/60 transition-colors duration-300">Online</span>
    </div>

    <!-- Background Space (Macro-Architecture) -->
    <div class="fixed inset-0 pointer-events-none z-0 flex items-center justify-center">
        <!-- Structural Grid -->
        <div class="absolute inset-0 bg-architectural opacity-50"></div>
        <!-- Ambient Glow from "server layout" behind -->
        <div class="absolute w-[600px] h-[400px] bg-accent-emerald/5 blur-[120px] rounded-[100%] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
    </div>

    <!-- Main Application Wrapper -->
    <main class="min-h-[100dvh] w-full flex items-center justify-center relative z-10 px-4 py-8">
        
        <!-- Authentication Surface (Meso-Architecture) -->
        <div class="w-full max-w-[400px] md:max-w-[450px] glass-panel rounded-[1.25rem] p-6 sm:p-8 animate-enter-card flex flex-col relative z-20">
            
            <!-- Header section -->
            <div class="flex flex-col items-center text-center mb-8">
                <div class="w-12 h-12 bg-surface-800 rounded-xl border border-white/[0.06] flex items-center justify-center mb-4 shadow-sm relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent pointer-events-none"></div>
                    <i class="ph ph-books text-2xl text-white/90"></i>
                </div>
                <h1 class="text-2xl font-semibold tracking-tight text-white mb-2">Welcome back</h1>
                <p class="text-sm text-white/60">Enter your credentials to access your servers.</p>
            </div>

            <!-- Inline Alert Container (Error / State Reporting) -->
            <div id="alert-container" class="hidden mb-6 flex items-start gap-3 p-3.5 rounded-lg border text-sm backdrop-blur-sm transition-all duration-300">
                <i id="alert-icon" class="ph-fill ph-warning-circle text-lg mt-0.5 shrink-0"></i>
                <div class="flex flex-col">
                    <span id="alert-title" class="font-medium"></span>
                    <span id="alert-message" class="text-white/70 mt-0.5 leading-snug"></span>
                </div>
                <button type="button" id="alert-resend" class="hidden mt-2 text-xs font-semibold hover:underline">Resend email</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="flex flex-col gap-5 w-full" novalidate>
                
                <!-- Email Input -->
                <div class="flex flex-col gap-1.5 focus-within:z-10 relative">
                    <label for="email" class="text-xs font-medium text-white/60 pl-1 uppercase tracking-wider">Email</label>
                    <div class="relative">
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="you@university.edu" 
                            required
                            class="input-primitive w-full h-[42px] px-3.5 rounded-lg text-sm placeholder:text-white/20 text-white shadow-sm font-medium"
                            autocomplete="email"
                        >
                        <!-- Inline Validation Icon (Hidden by default) -->
                        <div id="email-valid-icon" class="absolute right-3 top-1/2 -translate-y-1/2 scale-0 opacity-0 transition-all duration-300 pointer-events-none">
                            <i class="ph-fill ph-check-circle text-accent-emerald"></i>
                        </div>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="flex flex-col gap-1.5 relative">
                    <label for="password" class="text-xs font-medium text-white/60 pl-1 uppercase tracking-wider flex justify-between">
                        Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        placeholder="••••••••••••"
                        required
                        class="input-primitive w-full h-[42px] px-3.5 rounded-lg text-sm text-white shadow-sm font-medium font-mono placeholder:font-sans placeholder:text-white/20 tracking-widest placeholder:tracking-normal"
                        autocomplete="current-password"
                    >
                </div>

                <!-- Remember Me & Options Row -->
                <div class="flex items-center justify-between mt-1">
                    <label class="flex items-center gap-2.5 cursor-pointer group select-none">
                        <input type="checkbox" id="remember-me" class="checkbox-primitive" aria-label="Remember me for 30 days">
                        <span class="text-sm text-white/60 group-hover:text-white/90 transition-colors">Remember me for 30 days</span>
                    </label>
                </div>

                <!-- Submit Button Area -->
                <div class="mt-4 flex flex-col gap-4">
                    <button 
                        type="submit" 
                        id="submit-btn" 
                        disabled
                        class="btn-primary w-full h-11 rounded-lg text-sm font-semibold flex items-center justify-center relative overflow-hidden group shadow-[0_2px_8px_rgba(16,185,129,0.0)] active:shadow-none"
                    >
                        <span class="absolute inset-0 w-full h-full bg-gradient-to-t from-black/10 to-transparent pointer-events-none"></span>
                        <span id="submit-text" class="relative z-10 transition-transform duration-300">Log in</span>
                        <!-- Loading Spinner (Absolute centered, scales in) -->
                        <div id="submit-spinner" class="absolute inset-0 flex items-center justify-center scale-50 opacity-0 transition-all duration-300 z-10">
                            <i class="ph-bold ph-spinner-gap animate-spin text-lg"></i>
                        </div>
                    </button>
                    
                    <!-- Auxiliary Links -->
                    <div class="flex flex-col gap-3 text-center w-full">
                        <a href="/forgot-password" class="text-sm text-accent-emerald hover:text-white transition-colors duration-200">
                            Forgot your password?
                        </a>
                        <p class="text-sm text-white/60">
                            Don't have an account? 
                            <a href="/signup" class="text-white hover:text-accent-emerald font-medium transition-colors duration-200">Sign up</a>
                        </p>
                    </div>
                </div>
            </form>

            <!-- Legal Fine Print -->
            <div class="mt-8 pt-6 border-t border-white/[0.06] text-center">
                <p class="text-[11px] text-white/40 leading-relaxed">
                    By logging in, you agree to our <br class="sm:hidden" />
                    <a href="/terms" class="hover:text-white transition-colors underline decoration-white/20 underline-offset-2">Terms of Service</a> & 
                    <a href="/privacy" class="hover:text-white transition-colors underline decoration-white/20 underline-offset-2">Privacy Policy</a>.
                </p>
            </div>
            
        </div>
        
        <!-- Setup Guide Comment for UI Developer (Visible only in source) -->
        <!-- 
            Dev Instructions for interaction states (type these emails to test):
            1. 'error@test.com' -> Tests 401 Invalid Credentials
            2. 'locked@test.com' -> Tests 403 Account Locked
            3. 'verify@test.com' -> Tests 403 Unverified Email
            4. 'offline' (in email box) or turn off wifi -> Tests strict network drop
            5. 'anything-else' -> Tests successful flow
        -->
    </main>

    <!-- Interactive Logic (Micro-Architecture & Form State Machine) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submit-btn');
            const submitText = document.getElementById('submit-text');
            const submitSpinner = document.getElementById('submit-spinner');
            
            const alertContainer = document.getElementById('alert-container');
            const alertIcon = document.getElementById('alert-icon');
            const alertTitle = document.getElementById('alert-title');
            const alertMessage = document.getElementById('alert-message');
            const alertResend = document.getElementById('alert-resend');
            const emailValidIcon = document.getElementById('email-valid-icon');

            const wedge = document.getElementById('connection-wedge');
            const wedgeDot = document.getElementById('wedge-dot');
            const wedgeText = document.getElementById('wedge-text');

            let isNetworkOnline = navigator.onLine;

            // --- Network State Engine (The Wedge) ---
            const updateNetworkState = (online) => {
                isNetworkOnline = online;
                if(online) {
                    wedgeDot.className = "w-1.5 h-1.5 rounded-full transition-colors duration-300 shadow-[0_0_8px_theme('colors.accent.emerald')] bg-accent-emerald";
                    wedgeText.textContent = "Online";
                    wedgeText.className = "text-xs font-medium transition-colors duration-300 text-white/60";
                    wedge.classList.replace('bg-danger/20', 'bg-surface-800');
                    wedge.classList.replace('border-danger/30', 'border-white/[0.06]');
                    
                    // Re-validate button state if internet restored
                    validateForm();
                    hideAlert();
                } else {
                    wedgeDot.className = "w-1.5 h-1.5 rounded-full transition-colors duration-300 shadow-[0_0_8px_theme('colors.danger')] bg-danger";
                    wedgeText.textContent = "Offline";
                    wedgeText.className = "text-xs font-medium transition-colors duration-300 text-danger";
                    wedge.classList.replace('bg-surface-800', 'bg-danger/10');
                    wedge.classList.replace('border-white/[0.06]', 'border-danger/20');
                    
                    // Disable button immediately when offline, per PD
                    submitBtn.disabled = true;
                    submitBtn.title = "Internet required to log in";
                    
                    if(formState === 'submitting') {
                        setFormState('idle');
                        showAlert('connection-lost');
                    }
                }
            };

            window.addEventListener('online', () => updateNetworkState(true));
            window.addEventListener('offline', () => updateNetworkState(false));

            // --- Form State Management ---
            let formState = 'idle'; // idle | valid | submitting | error

            const validateForm = () => {
                if(formState === 'submitting') return;
                
                const isValid = emailInput.value.length > 0 && passwordInput.value.length > 0;
                
                // Simple email aesthetic micro-interaction
                if(emailInput.value.includes('@') && emailInput.value.includes('.')) {
                    emailValidIcon.classList.remove('scale-0', 'opacity-0');
                    emailValidIcon.classList.add('scale-100', 'opacity-100');
                } else {
                    emailValidIcon.classList.add('scale-0', 'opacity-0');
                    emailValidIcon.classList.remove('scale-100', 'opacity-100');
                }

                if(isValid && isNetworkOnline) {
                    submitBtn.disabled = false;
                    submitBtn.classList.add('shadow-[0_4px_12px_rgba(16,185,129,0.3)]');
                    submitBtn.title = "";
                } else {
                    submitBtn.disabled = true;
                    submitBtn.classList.remove('shadow-[0_4px_12px_rgba(16,185,129,0.3)]');
                }
            };

            emailInput.addEventListener('input', () => {
                resetErrors();
                validateForm();
            });
            passwordInput.addEventListener('input', () => {
                resetErrors();
                validateForm();
            });

            // UI Controllers
            const setFormState = (state) => {
                formState = state;
                if(state === 'submitting') {
                    submitBtn.disabled = true;
                    emailInput.disabled = true;
                    passwordInput.disabled = true;
                    
                    // Button micro-interaction (text out, spinner in)
                    submitText.style.transform = 'translateY(-20px)';
                    submitText.style.opacity = '0';
                    submitSpinner.classList.remove('scale-50', 'opacity-0');
                    submitSpinner.classList.add('scale-100', 'opacity-100');
                    
                    hideAlert();
                } else {
                    emailInput.disabled = false;
                    passwordInput.disabled = false;
                    
                    submitText.style.transform = 'translateY(0)';
                    submitText.style.opacity = '1';
                    submitSpinner.classList.add('scale-50', 'opacity-0');
                    submitSpinner.classList.remove('scale-100', 'opacity-100');
                    validateForm();
                }
            };

            const showAlert = (type) => {
                alertContainer.classList.remove('hidden', 'bg-danger/10', 'border-danger/20', 'text-danger');
                alertResend.classList.add('hidden');
                alertResend.className = "hidden mt-2 text-xs font-semibold hover:underline";
                
                emailInput.classList.add('input-error');
                passwordInput.classList.add('input-error');

                // Configuration per PD table
                if(type === '401') {
                    alertContainer.classList.add('bg-danger/10', 'border-danger/30', 'text-danger');
                    alertTitle.textContent = "Login Failed";
                    alertMessage.textContent = "Email or password is incorrect. Try again or reset your password.";
                } 
                else if (type === '403-locked') {
                    alertContainer.classList.add('bg-accent-amber/10', 'border-accent-amber/30', 'text-accent-amber');
                    alertTitle.textContent = "Account Locked";
                    alertMessage.textContent = "Too many login attempts. Try again in 15 minutes or reset your password.";
                    alertIcon.className = "ph-fill ph-lock-key text-lg mt-0.5 shrink-0";
                }
                else if (type === '403-verify') {
                    alertContainer.classList.add('bg-accent-amber/10', 'border-accent-amber/30', 'text-accent-amber');
                    alertTitle.textContent = "Verification Required";
                    alertMessage.textContent = "Please verify your email first. Check your inbox for the link.";
                    alertIcon.className = "ph-fill ph-envelope-open text-lg mt-0.5 shrink-0";
                    alertResend.classList.remove('hidden');
                    alertResend.classList.add('text-accent-amber');
                }
                else if (type === '429') {
                    alertContainer.classList.add('bg-surface-700', 'border-surface-600', 'text-white/90');
                    alertTitle.textContent = "Too many requests";
                    alertMessage.textContent = "Wait a moment and try again.";
                    alertIcon.className = "ph-fill ph-hourglass-high text-lg mt-0.5 shrink-0 text-white/50";
                }
                else if (type === 'connection-lost') {
                    alertContainer.classList.add('bg-danger/10', 'border-danger/30', 'text-danger');
                    alertTitle.textContent = "Connection Lost";
                    alertMessage.textContent = "Please check your internet and retry.";
                    alertIcon.className = "ph-fill ph-wifi-x text-lg mt-0.5 shrink-0";
                }

                formState = 'error';
                // Trigger reflow for animation
                void alertContainer.offsetWidth;
                alertContainer.classList.add('toast-enter', 'flex');
            };

            const hideAlert = () => {
                alertContainer.classList.add('hidden');
                alertContainer.classList.remove('toast-enter', 'flex');
                emailInput.classList.remove('input-error');
                passwordInput.classList.remove('input-error');
            };

            const resetErrors = () => {
                if(formState === 'error') {
                    hideAlert();
                    formState = 'idle';
                }
            };

            // --- Form Submission Simulation (API Mock) ---
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                if(!isNetworkOnline) return;

                const email = emailInput.value.toLowerCase();
                setFormState('submitting');

                // Simulate network latency (1.2s to be < 1.5s success metric)
                setTimeout(() => {
                    // Developer overrides embedded into inputs for review demo:
                    if(email === 'offline') {
                        updateNetworkState(false);
                    }
                    else if (email === 'error@test.com' || email.includes('error')) {
                        setFormState('error');
                        showAlert('401');
                    } 
                    else if (email === 'locked@test.com' || email.includes('locked')) {
                        setFormState('error');
                        showAlert('403-locked');
                    }
                    else if (email === 'verify@test.com' || email.includes('verify')) {
                        setFormState('error');
                        showAlert('403-verify');
                    }
                    else if (email.includes('spam')) {
                        setFormState('error');
                        showAlert('429');
                    }
                    else {
                        // Success State Simulation (Session established, redirecting)
                        submitBtn.classList.replace('btn-primary', 'bg-accent-emerald');
                        submitSpinner.innerHTML = '<i class="ph-bold ph-check text-xl"></i>';
                        setTimeout(() => {
                            // Flash effect before redirect simulating full page load to rail
                            document.body.style.opacity = '0';
                            document.body.style.transition = 'opacity 0.2s';
                        }, 400);
                    }
                }, 1200);
            });

            // Init state
            validateForm();
        });
    </script>
</body>
</html>
