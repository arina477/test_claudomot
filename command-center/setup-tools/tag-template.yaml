# Tag Template — <Your Project>
#
# Project-active agent tags + their per-tag inputs. Consumed by
# `claudomat-brain/setup-tools/agent-creator/agent-creator.md` at install
# (Phase 6) and on every catalog-growth event mid-project.
#
# Schema (per tag):
#   <tag>:
#     role_class:    head | executor | verifier | board
#     model:         opus | sonnet              # optional; defaults: opus for head/verifier/board, sonnet for executor
#     description:   "<one-line lifted into card frontmatter>"
#     # Per-class fields per agent-creator.md § Inputs:
#     #   head      → persona, block, block_stages, lifecycle, domain_description, role_focus,
#     #               specialist_roster, block_principles_file, block_state_fields,
#     #               next_block_handoff, escalation_target
#     #   executor  → tech_surface, sdk_or_api, specialist_roster
#     #   verifier  → verification_target, verdict_shape, specialist_roster,
#     #               consultation_sequence, severity_rating_scheme, verdict_template
#     #   board     → role_lens_oneliner, role_description_paragraph, reading_list_base
#
# Maintenance:
#   - Append new tags at L-2 distill or by founder request.
#   - Removing a tag does NOT delete the agent card at ~/.claude/agents/<tag>.md;
#     hand-delete if you want the agent gone.
#   - Schema changes: bump `schema_version` and document migration in CHANGELOG.

schema_version: 0.2.0

# ============================================================================
# BOARD members (7 fixed seats — generated at install per board-members.md)
# ============================================================================

strategist:
  role_class: board
  description: "Bet alignment, direction, strategic position"
  role_lens_oneliner: "Bet alignment, direction, strategic position"
  role_description_paragraph: "(populated at install from board-members.md)"
  reading_list_base:
    - founder_bets table (DB) via Bet — list live recipe in claudomat-brain/db/SCHEMA.md
    - command-center/product/product-decisions.md
    - milestones table (DB) via Milestone — list todo recipe in claudomat-brain/db/SCHEMA.md
    - command-center/principles/PRODUCT-PRINCIPLES.md

industry-expert:
  role_class: board
  description: "Prior art + pattern library across tech, product, and organizational patterns"
  role_lens_oneliner: "Prior art + pattern library across tech, product, and organizational patterns"
  role_description_paragraph: "(populated at install from board-members.md)"
  reading_list_base:
    - command-center/artifacts/competitive-benchmarks/INDEX.md
    - founder_bets table (DB) via Bet — list live recipe in claudomat-brain/db/SCHEMA.md

realist:
  role_class: board
  description: "Evidence, data, assumed-unverified claims — show the proof"
  role_lens_oneliner: "Evidence, data, assumed-unverified claims, 'show the proof'"
  role_description_paragraph: "(populated at install from board-members.md)"
  reading_list_base:
    - command-center/product/product-decisions.md

user-advocate:
  role_class: board
  description: "User-experienced impact (UX + retention + trust + brand signal)"
  role_lens_oneliner: "User-experienced impact: in-product UX + retention + trust + brand signal"
  role_description_paragraph: "(populated at install from board-members.md)"
  reading_list_base:
    - command-center/artifacts/user-journey-map.md
    - design/DESIGN-SYSTEM.md

risk-officer:
  role_class: board
  description: "Tech-risk only — failure modes, escape routes, vendor + architectural lock-in"
  role_lens_oneliner: "Tech-risk only — failure modes, escape routes, operational stability, performance/scale, vendor + architectural lock-in, schema/migration risk"
  role_description_paragraph: "(populated at install from board-members.md)"
  reading_list_base:
    - command-center/principles/BUILD-PRINCIPLES.md
    - claudomat-brain/rules/external-sdk-integration-rules.md

counter-thinker:
  role_class: board
  description: "Steel-manned alternatives, inversion — what's the smartest opposing case?"
  role_lens_oneliner: "Steel-manned alternatives, inversion, 'what's the smartest opposing case?'"
  role_description_paragraph: "(populated at install from board-members.md)"
  reading_list_base:
    - command-center/product/product-decisions.md

founder-proxy:
  role_class: board
  description: "Founder voice via product-decisions.md + founder_bets"
  role_lens_oneliner: "Founder voice via product-decisions.md + founder_bets; HARD-STOP on no precedent"
