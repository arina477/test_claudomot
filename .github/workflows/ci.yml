name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: test, POSTGRES_USER: test, POSTGRES_DB: studyhall_test }
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL_TEST: postgres://test:test@localhost:5432/studyhall_test
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:ci

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm build
        env:
          VITE_API_ORIGIN: https://api-production-b93e.up.railway.app
          VITE_STORAGE_ORIGIN: https://fly.storage.tigris.dev
          VITE_LIVEKIT_URL: wss://studyhall.livekit.cloud

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  boot-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: test, POSTGRES_USER: test, POSTGRES_DB: studyhall_test }
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm build
        env:
          VITE_API_ORIGIN: https://api-production-b93e.up.railway.app
          VITE_STORAGE_ORIGIN: https://fly.storage.tigris.dev
          VITE_LIVEKIT_URL: wss://studyhall.livekit.cloud
      - name: Start compiled API in background
        run: node apps/api/dist/src/main.js &> /tmp/api-boot.log &
        env:
          PORT: '3000'
          DATABASE_URL: postgres://test:test@localhost:5432/studyhall_test
          SUPERTOKENS_CONNECTION_URI: http://localhost:3567
          SUPERTOKENS_API_KEY: dummy-key-probe
          API_ORIGIN: http://localhost:3000
          WEB_ORIGIN: http://localhost:5173
      - name: Poll /health (30s cap)
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health | grep -q '"status":"ok"'; then
              echo "boot-probe: /health returned ok on attempt $i"
              exit 0
            fi
            echo "boot-probe: attempt $i — not ready yet, sleeping 1s"
            sleep 1
          done
          echo "boot-probe: /health never became healthy after 30s — dumping logs:"
          cat /tmp/api-boot.log
          exit 1
      - name: Kill background API
        if: always()
        run: pkill -f 'apps/api/dist/src/main.js' || true

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      E2E_BASE_URL: https://web-production-bce1a8.up.railway.app
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @studyhall/web exec playwright install --with-deps chromium
      - name: Run E2E tests (smoke + authed create-server)
        run: pnpm --filter @studyhall/web exec playwright test
        env:
          E2E_FIXTURE_EMAIL: ${{ secrets.E2E_FIXTURE_EMAIL }}
          E2E_FIXTURE_PASSWORD: ${{ secrets.E2E_FIXTURE_PASSWORD }}
